# 默认页面配置（请勿直接修改）。
# 建议复制到 config/user/pages/bookmarks.yml 并按需调整。
# 说明：该页面通常由“书签导入工具”自动生成，手工修改时请保持字段结构一致。
title: 书签
subtitle: bookmarks

# 指定使用的模板文件名，现有页面模板可见 templates/pages（不含 .hbs）
# 提示：bookmarks 模板页面标题区会自动显示“内容更新：YYYY-MM-DD（git|mtime）”，无需额外配置
template: bookmarks

categories:
  - name: '常用网站'
    icon: 'fas fa-star'
    sites:
      - name: 'GitHub'
        url: 'https://github.com/'
        icon: 'fab fa-github'
        description: '代码托管平台'

  - name: '社交媒体'
    icon: 'fas fa-share-alt'
    groups:
      - name: '国内平台'
        icon: 'fas fa-map-marker-alt'
        sites:
          - name: '微博'
            url: 'https://weibo.com/'
            icon: 'fas fa-comment'
            description: '中文社交媒体平台'
          - name: '知乎'
            url: 'https://www.zhihu.com/'
            icon: 'fas fa-question-circle'
            description: '中文问答社区'
          - name: 'B站'
            url: 'https://www.bilibili.com/'
            icon: 'fas fa-video'
            description: '弹幕视频网站'

  - name: '设计资源'
    icon: 'fas fa-palette'
    subcategories:
      - name: 'UI设计工具'
        icon: 'fas fa-paint-brush'
        groups:
          - name: '原型设计'
            icon: 'fas fa-drafting-compass'
            sites:
              - name: 'Figma'
                url: 'https://www.figma.com/'
                icon: 'fab fa-figma'
                description: '协作式UI设计工具'
              - name: 'Sketch'
                url: 'https://www.sketch.com/'
                icon: 'fab fa-sketch'
                description: 'Mac平台UI设计工具'
              - name: 'Adobe XD'
                url: 'https://www.adobe.com/products/xd.html'
                icon: 'fab fa-adobe'
                description: 'Adobe UI设计工具'
          - name: '设计系统'
            icon: 'fas fa-th-large'
            sites:
              - name: 'Ant Design'
                url: 'https://ant.design/'
                icon: 'fas fa-th'
                forceIconMode: manual
                description: '企业级UI设计语言'
              - name: 'Material Design'
                url: 'https://material.io/design'
                icon: 'fas fa-cube'
                description: 'Google设计系统'
              - name: 'Bootstrap'
                url: 'https://getbootstrap.com/'
                icon: 'fab fa-bootstrap'
                description: '响应式CSS框架'
      - name: '视觉资源'
        icon: 'fas fa-image'
        groups:
          - name: '图标库'
            icon: 'fas fa-icons'
            sites:
              - name: 'Font Awesome'
                url: 'https://fontawesome.com/'
                icon: 'fab fa-font-awesome'
                description: '图标库'
              - name: 'Iconfont'
                url: 'https://www.iconfont.cn/'
                icon: 'fas fa-icons'
                description: '阿里巴巴图标库'
              - name: 'Feather Icons'
                url: 'https://feathericons.com/'
                icon: 'fas fa-feather'
                description: '简洁的图标库'
          - name: '配色方案'
            icon: 'fas fa-palette'
            sites:
              - name: 'Coolors'
                url: 'https://coolors.co/'
                icon: 'fas fa-palette'
                description: '在线配色方案生成器'
              - name: 'Adobe Color'
                url: 'https://color.adobe.com/'
                icon: 'fab fa-adobe'
                description: 'Adobe配色工具'
              - name: 'Paletton'
                url: 'https://paletton.com/'
                icon: 'fas fa-palette'
                description: '配色方案设计工具'
